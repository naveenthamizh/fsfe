<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ws</title>
  </head>
  <body>
    <p>Web socket</p>
  </body>

  <script>
    let ws;
    const protocol = window.location.protocol === "https:" ? "wss" : "ws";
    ws = new WebSocket(`${protocol}://${window.location.host}`);

    ws.onmessage = (event) => {
      console.log("[Event]", event.data);
    };
  </script>
</html>
